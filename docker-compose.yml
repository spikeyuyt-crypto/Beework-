services:
  mysql:
    image: mysql:8.4
    container_name: beework-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

  backend:
    build:
      context: ./Backend
    container_name: beework-backend
    environment:
      SPRING_PROFILES_ACTIVE: company
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/mysql?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./Frontend/BeeworkFrontend
    container_name: beework-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql-data:
